<style>
    body {
        background-color: burlywood;

<body>
    <center>
    <h1>Entre em Contato</h1>
    <p>Use o formulário abaixo para me mandar uma mensagem.</p> </center>
    <form>
        <p>
            <center>
            <label>Nome Completo:</label><br>
            <input type="text" name="nome" required> </center>
        </p>
        <p>
           <center> <label>E-mail:</label><br>
            <input type="email" name="email" required> </center>
        </p>
        <p> 
            <center>
           <label>Assunto</label><br>
            <select name="assunto">
                 <option value="vaga">Oportunidade</option>
                 <option value="duvida">Dúvida</option>
                 <option value="outros">Outros</option> </center>
             
            </select>
        </p>
        <p>
            <label>Sua Mensagem:</label><br>
            <textarea name="mensagem" id="4"></textarea>
        </p>
        <button type="submit">Enviar Dados</button>

    </form>
    <br>
    <a href="index.html">Voltar para o início</a>
